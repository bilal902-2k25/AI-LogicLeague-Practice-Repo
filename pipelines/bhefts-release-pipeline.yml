trigger:
  branches:
    include:
      - Catalyst/Main

pr:
  branches:
    include:
      - Catalyst/Main

variables:
  ReleaseWorkItemID: ''          # Set at pipeline run-time
  ReleaseVersion:    ''          # e.g. v0.9
  ArtifactPath:      'restricted-generic-artifactingestion/50274-BHEFTS/package/Gen_Release.zip'

pool:
  vmImage: 'windows-latest'

# ============================================================
#  CI STAGE — Build, scan and record metrics
# ============================================================
stages:
  - stage: CI
    displayName: 'CI — Build & Security Checks'
    jobs:
      - job: BuildAndScan
        displayName: 'Build Vendor Binaries & Security Scan'
        pool:
          demands:
            - Agent.Name -equals hki4ympy8hl0l00
        steps:
          - task: PowerShell@2
            displayName: 'Build Vendor Binaries'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Building BHEFTS vendor binaries..."
                Write-Host "Application : BHEFTS"
                Write-Host "ITAM/CI ID  : 50274"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "Vendor      : Adroit Technology"
                Write-Host "##[section] Build complete."

          - task: PowerShell@2
            displayName: 'Security Checks & Early Feedback'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Running security scans on artifacts..."
                Write-Host "Scanning: $(ArtifactPath)"
                Write-Host "Artifact: Gen_Release.zip"
                Write-Host "##[section] Security checks passed."

          - task: PowerShell@2
            displayName: 'Transfer Artifacts to Staging Store'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Transferring artifacts from vendor-generic-lab-local to staging..."
                Write-Host "Source  : vendor-generic-lab-local/$(ArtifactPath)"
                Write-Host "Target  : staging-artifacts/50274-BHEFTS/$(ReleaseVersion)/Gen_Release.zip"
                Write-Host "##[section] Transfer complete."

          - task: PowerShell@2
            displayName: 'Record Build Metrics'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Recording build metrics..."
                Write-Host "Stage       : CI"
                Write-Host "Build ID    : $(Build.BuildId)"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "Timestamp   : $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')"
                Write-Host "##[section] Metrics recorded."

# ============================================================
#  DEV STAGE — Puppet deploy on dev/test servers
# ============================================================
  - stage: Dev
    displayName: 'Dev — Puppet Deployment'
    dependsOn: CI
    condition: succeeded()
    jobs:
      - job: DevDeploy
        displayName: 'Deploy to Dev via Puppet'
        pool:
          demands:
            - Agent.Name -equals hki4ympy8hl0l00
        steps:
          - task: PowerShell@2
            displayName: 'Validate ITAM-ID & Fetch Secrets'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Validating ITAM-ID..."
                Write-Host "ITAM/CI ID  : 50274"
                Write-Host "Application : BHEFTS"
                Write-Host "##[section] Fetching deployment secrets from vault..."
                Write-Host "##[section] Validation complete."

          - task: PowerShell@2
            displayName: 'deploy_puppet'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Downloading artifacts for puppet deployment..."
                Write-Host "Artifact    : Gen_Release.zip"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "##[section] Running puppet agent on dev servers..."
                Write-Host "Node        : hki4ympy8hl0l00"
                Write-Host "##[section] Puppet deployment complete on dev."

          - task: PowerShell@2
            displayName: 'Record Deployment'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Recording deployment details..."
                Write-Host "Stage       : Dev"
                Write-Host "Node        : hki4ympy8hl0l00"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "Status      : Deployed"
                Write-Host "##[section] Deployment recorded."

          - task: PowerShell@2
            displayName: 'Fetch Build Info'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Fetching build info from artifact store..."
                Write-Host "Build ID    : $(Build.BuildId)"
                Write-Host "Artifact    : Gen_Release.zip"
                Write-Host "Checksum    : [retrieved from JFrog metadata]"
                Write-Host "##[section] Build info fetched."

          - task: PowerShell@2
            displayName: 'Record Build Metrics (Dev)'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Recording dev build metrics..."
                Write-Host "Stage       : Dev"
                Write-Host "Timestamp   : $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')"
                Write-Host "##[section] Dev metrics recorded."

# ============================================================
#  QA STAGE — Tests, summary, DTM approval
# ============================================================
  - stage: QA
    displayName: 'QA — Tests & DTM Approval'
    dependsOn: Dev
    condition: succeeded()
    jobs:
      - job: QATest
        displayName: 'Run QA Tests & Generate Summary'
        pool:
          demands:
            - Agent.Name -equals hki4ympy8hl0l00
        steps:
          - task: PowerShell@2
            displayName: 'Puppet Deploy on QA Servers'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Running puppet agent on QA servers..."
                Write-Host "Node        : hki4ympy8hl0l00"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "##[section] QA puppet deployment complete."

          - task: PowerShell@2
            displayName: 'Run QA Test Cases'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Executing QA test suite..."
                Write-Host "Application : BHEFTS"
                Write-Host "Total Tests : 42"
                Write-Host "Passed      : 42"
                Write-Host "Failed      : 0"
                Write-Host "Coverage    : 87%"
                Write-Host "##[section] All QA tests passed."

          - task: PowerShell@2
            displayName: 'Generate Test Summary'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Generating test evidence and summary..."
                Write-Host "Report      : test-summary-$(ReleaseVersion).html"
                Write-Host "Evidence    : uploaded to ADO test results"
                Write-Host "##[section] Test summary generated."

          - task: PowerShell@2
            displayName: 'DTM Approval Gate (Simulated)'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Checking DTM (Digital Test Manager) approval..."
                Write-Host "DTM Status  : APPROVED"
                Write-Host "Approved by : DTM Lead"
                Write-Host "##[section] DTM gate passed."

# ============================================================
#  STAGING STAGE — Deploy, security scan, test summary
# ============================================================
  - stage: Staging
    displayName: 'Staging — Deployment & Checks'
    dependsOn: QA
    condition: succeeded()
    jobs:
      - job: StagingDeploy
        displayName: 'Deploy to Staging'
        pool:
          demands:
            - Agent.Name -equals hki4ympy8hl0l00
        steps:
          - task: PowerShell@2
            displayName: 'Deploy to Staging Servers'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Deploying to staging servers via puppet..."
                Write-Host "Node        : hki4ympy8hl0l00"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "Environment : Staging"
                Write-Host "##[section] Staging deployment complete."

          - task: PowerShell@2
            displayName: 'Staging Security Checks'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Running security checks on staging environment..."
                Write-Host "Vulnerability scan : PASSED"
                Write-Host "Compliance check   : PASSED"
                Write-Host "##[section] Staging security checks complete."

          - task: PowerShell@2
            displayName: 'Generate Staging Test Summary'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Generating staging test summary..."
                Write-Host "Report      : staging-summary-$(ReleaseVersion).html"
                Write-Host "##[section] Staging test summary generated."

# ============================================================
#  PRE-RELEASE STAGE — Release checks & work item validation
# ============================================================
  - stage: PreRelease
    displayName: 'Pre-Release — Release Checks'
    dependsOn: Staging
    condition: succeeded()
    jobs:
      - job: PreReleaseChecks
        displayName: 'Release Checks & Work Item Validation'
        pool:
          demands:
            - Agent.Name -equals hki4ympy8hl0l00
        steps:
          - task: PowerShell@2
            displayName: 'Validate Release Work Item'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Validating Release Work Item ID: $(ReleaseWorkItemID)..."
                Write-Host "Work Item   : $(ReleaseWorkItemID)"
                Write-Host "ADO Repo    : 50274-REPO-BHEFTS"
                Write-Host "Status      : VALID"
                Write-Host "##[section] Work item validation passed."

          - task: PowerShell@2
            displayName: 'Check Work Item Tabs (Solutions Intent, etc.)'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Checking work item tab states..."
                Write-Host "Solutions Intent  : Approved"
                Write-Host "Architecture Tab  : Approved"
                Write-Host "Security Tab      : Approved"
                Write-Host "Compliance Tab    : Approved"
                Write-Host "##[section] All work item tabs approved."

          - task: PowerShell@2
            displayName: 'Pre-Release Gate Check'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Running pre-release gate checks..."
                Write-Host "Change Request    : APPROVED"
                Write-Host "Release Manager   : CONFIRMED"
                Write-Host "##[section] Pre-release gate passed."

# ============================================================
#  RELEASE STAGE — Approval, checksum, promote, RWI update
# ============================================================
  - stage: Release
    displayName: 'Release — Promote to Production'
    dependsOn: PreRelease
    condition: succeeded()
    jobs:
      - job: ReleaseProduction
        displayName: 'Promote Artifacts & Update RWI'
        pool:
          demands:
            - Agent.Name -equals sg5qbxm2eh43z00
        steps:
          - task: PowerShell@2
            displayName: 'Verify Release Approval'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Verifying release approval from Release Manager..."
                Write-Host "Approved by : Release Manager"
                Write-Host "Work Item   : $(ReleaseWorkItemID)"
                Write-Host "##[section] Release approval verified."

          - task: PowerShell@2
            displayName: 'Verify Artifact Checksum'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Verifying artifact checksum..."
                Write-Host "Artifact    : Gen_Release.zip"
                Write-Host "Expected    : [checksum from JFrog]"
                Write-Host "Actual      : [checksum from local]"
                Write-Host "Status      : MATCH"
                Write-Host "##[section] Checksum verification passed."

          - task: PowerShell@2
            displayName: 'Promote Artifacts to Production'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Promoting artifacts to production servers..."
                Write-Host "Production Node 1 : sg5qbxm2eh43z00"
                Write-Host "Production Node 2 : hkiqbxm2eh43z00"
                Write-Host "Version           : $(ReleaseVersion)"
                Write-Host "Source            : vendor-generic-lab-local/$(ArtifactPath)"
                Write-Host "##[section] Artifacts promoted to production."

          - task: PowerShell@2
            displayName: 'Update Release Status & RWI in CR'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] Updating release status and RWI in change record..."
                Write-Host "Work Item   : $(ReleaseWorkItemID)"
                Write-Host "New Status  : Released"
                Write-Host "RWI Updated : Yes"
                Write-Host "Timestamp   : $(Get-Date -Format 'yyyy-MM-ddTHH:mm:ssZ')"
                Write-Host "##[section] Release status and RWI updated successfully."

          - task: PowerShell@2
            displayName: 'Release Complete Summary'
            inputs:
              targetType: inline
              script: |
                Write-Host "##[section] === RELEASE COMPLETE ==="
                Write-Host "Application : BHEFTS"
                Write-Host "ITAM/CI ID  : 50274"
                Write-Host "Version     : $(ReleaseVersion)"
                Write-Host "Work Item   : $(ReleaseWorkItemID)"
                Write-Host "ADO Repo    : 50274-REPO-BHEFTS"
                Write-Host "Branch      : Catalyst/Main"
                Write-Host "Prod Nodes  : sg5qbxm2eh43z00, hkiqbxm2eh43z00"
                Write-Host "##[section] All pipeline stages completed successfully!"
